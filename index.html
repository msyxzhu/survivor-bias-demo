<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>幸存者偏差 - Survivorship Bias</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700;900&family=ZCOOL+KuaiLe&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1920px;height:1080px;overflow:hidden;background:#f5f0e8;font-family:'Noto Sans SC',sans-serif;}

/* Paper texture */
.paper{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(139,119,90,0.05) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(139,119,90,0.08) 0%,transparent 50%);}

/* Progress bar */
.progress{position:fixed;top:0;left:0;height:3px;background:#c0392b;width:0;z-index:1100;}

/* Corner labels */
.corner-title{position:fixed;top:20px;left:30px;z-index:999;opacity:0;}
.corner-title span{font-family:'ZCOOL KuaiLe','Noto Serif SC',serif;font-size:36px;color:#c0392b;font-weight:900;letter-spacing:4px;}
.corner-right{position:fixed;top:20px;right:30px;z-index:999;opacity:0;writing-mode:vertical-rl;font-size:18px;color:#999;letter-spacing:4px;}

/* Subtitle bar */
.sub-bar{position:fixed;bottom:0;left:0;width:100%;z-index:999;opacity:0;}
.sub-bg{background:rgba(40,40,40,0.85);padding:20px 60px;display:flex;align-items:center;justify-content:center;}
.sub-text{color:#fff;font-size:36px;text-align:center;font-weight:400;letter-spacing:2px;flex:1;}
.sub-credit{color:#aaa;font-size:18px;position:absolute;right:40px;bottom:25px;}

/* Scenes */
.scene{position:absolute;top:0;left:0;width:1920px;height:1080px;opacity:0;display:flex;align-items:center;justify-content:center;}

/* Scene 1: Black intro */
#s1{background:#111;flex-direction:column;}
#s1 .intro-text{color:#eee;font-size:48px;text-align:center;line-height:1.8;opacity:0;}

/* Scene 2-4: Plane scenes */
.plane-scene{flex-direction:column;padding:60px 100px;position:relative;}
.plane-area{position:relative;width:1920px;height:900px;}

/* Common SVG styles */
svg text{font-family:'Noto Sans SC',sans-serif;}
.stroke-main{fill:none;stroke:#333;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.stroke-light{fill:none;stroke:#666;stroke-width:1.5;}
.fill-white{fill:#f5f0e8;stroke:#333;stroke-width:2;}
.fill-body{fill:#e8e0d0;stroke:#333;stroke-width:2.5;}

/* Scene 6: Concept */
#s6{flex-direction:column;}

/* Scene 7+ */
.content-scene{padding:60px 100px;position:relative;}

/* Bullet holes */
.bh{opacity:0;transform-origin:center;}

/* Red dashed */
.red-dash{fill:none;stroke:#c0392b;stroke-width:3;stroke-dasharray:12 6;opacity:0;}

/* Speech bubble */
.bubble{fill:#fff;stroke:#333;stroke-width:2;rx:8;}
.bubble-text{font-size:28px;fill:#333;font-weight:700;text-anchor:middle;}

/* Labels */
.label-red{font-size:28px;fill:#c0392b;font-weight:700;}
.label-dark{font-size:28px;fill:#333;font-weight:700;}
.label-green{font-size:28px;fill:#27ae60;font-weight:700;}
.label-gray{font-size:28px;fill:#999;}

/* Big calligraphy text */
.calli{font-family:'ZCOOL KuaiLe','Noto Serif SC',serif;}
</style>
</head>
<body>
<div class="paper"></div>
<div class="progress" id="prog"></div>

<!-- Corner labels -->
<div class="corner-title" id="cornerTitle"><span>- 幸存者偏差 -</span></div>
<div class="corner-right" id="cornerRight">心理举例 无不良引导</div>

<!-- Subtitle bar -->
<div class="sub-bar" id="subBar">
  <div class="sub-bg">
    <div class="sub-text" id="subText"></div>
    <div class="sub-credit">@爱观察的汤姆</div>
  </div>
</div>

<!-- ============ SCENE 1: Black Intro ============ -->
<div class="scene" id="s1">
  <div class="intro-text">很多时候，我们看到的，<br>往往只是一个视角，而非真相。</div>
</div>

<!-- ============ SCENE 2: Plane + Bullet Holes ============ -->
<div class="scene" id="s2">
<svg viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Plane top-down view centered -->
  <g id="planeGroup" transform="translate(960,420)">
    <!-- Fuselage -->
    <ellipse class="fill-body" cx="0" cy="0" rx="60" ry="220"/>
    <!-- Cockpit -->
    <ellipse class="fill-body" cx="0" cy="-190" rx="25" ry="50"/>
    <!-- Wings -->
    <path class="fill-body" d="M-50,-30 L-350,-60 L-350,-30 L-50,10 Z"/>
    <path class="fill-body" d="M50,-30 L350,-60 L350,-30 L50,10 Z"/>
    <!-- Tail wings -->
    <path class="fill-body" d="M-30,190 L-150,170 L-150,190 L-30,210 Z"/>
    <path class="fill-body" d="M30,190 L150,170 L150,190 L30,210 Z"/>
    <!-- Tail fin -->
    <path class="fill-body" d="M-8,210 L0,240 L8,210 Z"/>
    <!-- Engines -->
    <ellipse class="fill-body" cx="-160" cy="-20" rx="22" ry="40"/>
    <ellipse class="fill-body" cx="160" cy="-20" rx="22" ry="40"/>
    <!-- Propellers -->
    <line class="stroke-main" x1="-160" y1="-65" x2="-160" y2="-55"/>
    <line class="stroke-main" x1="160" y1="-65" x2="160" y2="-55"/>
    <!-- Stars on wings -->
    <circle cx="-250" cy="-40" r="18" fill="none" stroke="#999" stroke-width="1.5"/>
    <circle cx="250" cy="-40" r="18" fill="none" stroke="#999" stroke-width="1.5"/>

    <!-- Bullet holes on wings and fuselage (NOT on engines/cockpit) -->
    <g class="bh" id="b1"><circle cx="-200" cy="-50" r="7" fill="#333"/><circle cx="-200" cy="-50" r="4" fill="#111"/></g>
    <g class="bh" id="b2"><circle cx="-280" cy="-45" r="6" fill="#333"/><circle cx="-280" cy="-45" r="3" fill="#111"/></g>
    <g class="bh" id="b3"><circle cx="-120" cy="-40" r="5" fill="#333"/><circle cx="-120" cy="-40" r="2.5" fill="#111"/></g>
    <g class="bh" id="b4"><circle cx="180" cy="-48" r="7" fill="#333"/><circle cx="180" cy="-48" r="4" fill="#111"/></g>
    <g class="bh" id="b5"><circle cx="260" cy="-42" r="6" fill="#333"/><circle cx="260" cy="-42" r="3" fill="#111"/></g>
    <g class="bh" id="b6"><circle cx="130" cy="-35" r="5" fill="#333"/><circle cx="130" cy="-35" r="2.5" fill="#111"/></g>
    <g class="bh" id="b7"><circle cx="-30" cy="-80" r="6" fill="#333"/><circle cx="-30" cy="-80" r="3" fill="#111"/></g>
    <g class="bh" id="b8"><circle cx="25" cy="-40" r="7" fill="#333"/><circle cx="25" cy="-40" r="4" fill="#111"/></g>
    <g class="bh" id="b9"><circle cx="-20" cy="30" r="5" fill="#333"/><circle cx="-20" cy="30" r="2.5" fill="#111"/></g>
    <g class="bh" id="b10"><circle cx="40" cy="80" r="6" fill="#333"/><circle cx="40" cy="80" r="3" fill="#111"/></g>
    <g class="bh" id="b11"><circle cx="-310" cy="-50" r="5" fill="#333"/><circle cx="-310" cy="-50" r="2.5" fill="#111"/></g>
    <g class="bh" id="b12"><circle cx="310" cy="-48" r="5" fill="#333"/><circle cx="310" cy="-48" r="2.5" fill="#111"/></g>
    <g class="bh" id="b13"><circle cx="-35" cy="130" r="5" fill="#333"/><circle cx="-35" cy="130" r="2.5" fill="#111"/></g>
    <g class="bh" id="b14"><circle cx="20" cy="150" r="6" fill="#333"/><circle cx="20" cy="150" r="3" fill="#111"/></g>
    <g class="bh" id="b15"><circle cx="35" cy="-100" r="5" fill="#333"/><circle cx="35" cy="-100" r="2.5" fill="#111"/></g>

    <!-- Wing highlight circles (dashed, for scene 3) -->
    <ellipse id="wingHL" class="red-dash" cx="0" cy="-20" rx="380" ry="100" stroke="#333" stroke-dasharray="15 8"/>
    <!-- Arrows pointing to wings -->
    <path id="arrowL" class="stroke-main" d="M-400,-120 C-380,-80 -370,-70 -350,-60" opacity="0" marker-end="url(#arrowHead)"/>
    <path id="arrowR" class="stroke-main" d="M400,-120 C380,-80 370,-70 350,-60" opacity="0" marker-end="url(#arrowHead)"/>

    <!-- Tail highlight (red dashed, for scene 4) -->
    <ellipse id="tailHL" class="red-dash" cx="0" cy="195" rx="170" ry="65" stroke="#c0392b"/>
  </g>

  <defs>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Military officer (right side) -->
  <g id="officer" transform="translate(1550,550)" opacity="0">
    <!-- Body (back view) -->
    <rect x="-40" y="0" width="80" height="120" rx="5" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- Shoulders -->
    <line x1="-50" y1="10" x2="-40" y2="0" stroke="#333" stroke-width="2.5"/>
    <line x1="50" y1="10" x2="40" y2="0" stroke="#333" stroke-width="2.5"/>
    <!-- Head -->
    <ellipse cx="0" cy="-25" rx="25" ry="30" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- Military hat -->
    <ellipse cx="0" cy="-48" rx="32" ry="8" fill="none" stroke="#333" stroke-width="2.5"/>
    <rect x="-25" y="-60" width="50" height="15" rx="3" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Belt -->
    <line x1="-40" y1="80" x2="40" y2="80" stroke="#333" stroke-width="3"/>
    <!-- Legs -->
    <line x1="-15" y1="120" x2="-15" y2="180" stroke="#333" stroke-width="2.5"/>
    <line x1="15" y1="120" x2="15" y2="180" stroke="#333" stroke-width="2.5"/>
    <!-- Speech bubble -->
    <rect x="-140" y="-140" width="160" height="60" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <polygon points="-20,-80 0,-60 -40,-80" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="-60" y="-102" text-anchor="middle" font-size="28" font-weight="700" fill="#333">加强机翼</text>
  </g>

  <!-- Wald (left side) -->
  <g id="wald" transform="translate(370,550)" opacity="0">
    <!-- Body (front-ish view with vest) -->
    <rect x="-35" y="5" width="70" height="110" rx="5" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- Vest -->
    <rect x="-25" y="15" width="50" height="80" rx="3" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Head -->
    <ellipse cx="0" cy="-25" rx="25" ry="30" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- Hair -->
    <path d="M-20,-48 C-15,-58 15,-58 20,-48" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Glasses -->
    <circle cx="-10" cy="-25" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="10" cy="-25" r="8" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="-2" y1="-25" x2="2" y2="-25" stroke="#333" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="-35" y1="30" x2="-55" y2="90" stroke="#333" stroke-width="2.5"/>
    <line x1="35" y1="30" x2="55" y2="90" stroke="#333" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="-12" y1="115" x2="-12" y2="180" stroke="#333" stroke-width="2.5"/>
    <line x1="12" y1="115" x2="12" y2="180" stroke="#333" stroke-width="2.5"/>
    <!-- Speech bubble -->
    <rect x="-20" y="-140" width="160" height="60" rx="10" fill="#fff" stroke="#333" stroke-width="2"/>
    <polygon points="20,-80 0,-60 40,-80" fill="#fff" stroke="#333" stroke-width="2"/>
    <text x="60" y="-102" text-anchor="middle" font-size="28" font-weight="700" fill="#333">保护机尾</text>
  </g>

  <!-- Crashed plane (small, bottom-left area) -->
  <g id="crashed" transform="translate(600,780) rotate(-30)" opacity="0">
    <ellipse cx="0" cy="0" rx="25" ry="80" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M-20,-15 L-120,-25 L-120,-15 L-20,5 Z" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M20,-15 L120,-25 L120,-15 L20,5 Z" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Smoke -->
    <path d="M-10,-80 C-30,-110 -5,-120 -15,-150" fill="none" stroke="#999" stroke-width="2" opacity="0.6"/>
    <path d="M5,-75 C15,-100 30,-115 20,-140" fill="none" stroke="#999" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Red dashed box around crashed plane -->
  <rect id="crashBox" x="430" y="680" width="260" height="200" rx="5" class="red-dash" stroke="#c0392b"/>
</svg>
</div>

<!-- ============ SCENE 5: Conclusion - Two planes compared ============ -->
<div class="scene" id="s5">
<svg viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Left: crashed plane (clean, no holes) with "加强机尾 ✅" -->
  <g transform="translate(500,350) rotate(-15)">
    <ellipse cx="0" cy="0" rx="25" ry="90" fill="none" stroke="#333" stroke-width="2.5"/>
    <path d="M-20,-15 L-130,-25 L-130,-15 L-20,5 Z" fill="none" stroke="#333" stroke-width="2.5"/>
    <path d="M20,-15 L130,-25 L130,-15 L20,5 Z" fill="none" stroke="#333" stroke-width="2.5"/>
    <ellipse cx="-60" cy="-10" rx="12" ry="20" fill="none" stroke="#333" stroke-width="2"/>
    <ellipse cx="60" cy="-10" rx="12" ry="20" fill="none" stroke="#333" stroke-width="2"/>
  </g>
  <text id="s5labelL" x="480" y="560" class="calli" font-size="48" fill="#333" font-weight="700" text-anchor="middle" opacity="0">加强机尾 ✅</text>

  <!-- Right: returning plane with bullet holes -->
  <g transform="translate(1420,320)">
    <ellipse cx="0" cy="0" rx="50" ry="180" fill="#e8e0d0" stroke="#333" stroke-width="2.5"/>
    <ellipse cx="0" cy="-155" rx="20" ry="40" fill="#e8e0d0" stroke="#333" stroke-width="2.5"/>
    <path d="M-40,-25 L-280,-50 L-280,-25 L-40,5 Z" fill="#e8e0d0" stroke="#333" stroke-width="2.5"/>
    <path d="M40,-25 L280,-50 L280,-25 L40,5 Z" fill="#e8e0d0" stroke="#333" stroke-width="2.5"/>
    <ellipse cx="-130" cy="-15" rx="18" ry="32" fill="#e8e0d0" stroke="#333" stroke-width="2"/>
    <ellipse cx="130" cy="-15" rx="18" ry="32" fill="#e8e0d0" stroke="#333" stroke-width="2"/>
    <!-- bullet holes -->
    <circle cx="-160" cy="-40" r="5" fill="#333"/><circle cx="-220" cy="-35" r="6" fill="#333"/>
    <circle cx="180" cy="-38" r="5" fill="#333"/><circle cx="240" cy="-42" r="6" fill="#333"/>
    <circle cx="-20" cy="-60" r="5" fill="#333"/><circle cx="30" cy="20" r="6" fill="#333"/>
    <circle cx="-25" cy="80" r="5" fill="#333"/><circle cx="15" cy="120" r="5" fill="#333"/>
  </g>
  <text id="s5labelR" x="1420" y="560" class="calli" font-size="48" fill="#333" font-weight="700" text-anchor="middle" opacity="0">加强机翼</text>
  <!-- Strikethrough line -->
  <line id="s5strike" x1="1320" y1="555" x2="1520" y2="555" stroke="#c0392b" stroke-width="4" opacity="0"/>
</svg>
</div>

<!-- ============ SCENE 6: Concept box ============ -->
<div class="scene" id="s6">
<svg viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Red dashed big box -->
  <rect id="s6box" x="310" y="80" width="1300" height="550" rx="15" fill="none" stroke="#c0392b" stroke-width="4" stroke-dasharray="18 8" opacity="0"/>
  <!-- Two small planes inside -->
  <g transform="translate(600,320) rotate(-15)" opacity="0" id="s6planeL">
    <ellipse cx="0" cy="0" rx="20" ry="70" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M-15,-10 L-100,-20 L-100,-10 L-15,5 Z" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M15,-10 L100,-20 L100,-10 L15,5 Z" fill="none" stroke="#333" stroke-width="2"/>
  </g>
  <g transform="translate(1300,300)" opacity="0" id="s6planeR">
    <ellipse cx="0" cy="0" rx="35" ry="130" fill="#e8e0d0" stroke="#333" stroke-width="2"/>
    <path d="M-30,-18 L-200,-35 L-200,-18 L-30,5 Z" fill="#e8e0d0" stroke="#333" stroke-width="2"/>
    <path d="M30,-18 L200,-35 L200,-18 L30,5 Z" fill="#e8e0d0" stroke="#333" stroke-width="2"/>
    <circle cx="-100" cy="-28" r="4" fill="#333"/><circle cx="120" cy="-25" r="4" fill="#333"/>
    <circle cx="-15" cy="-40" r="4" fill="#333"/><circle cx="20" cy="30" r="4" fill="#333"/>
  </g>
  <!-- Big title -->
  <text id="s6title" x="960" y="780" text-anchor="middle" class="calli" font-size="96" fill="#333" font-weight="900" opacity="0">幸存者偏差</text>
</svg>
</div>

<!-- ============ SCENE 7: Taleb / Black Swan ============ -->
<div class="scene" id="s7">
<svg viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Reader (Taleb-like figure, left) -->
  <g id="s7reader" transform="translate(250,450)" opacity="0">
    <ellipse cx="0" cy="-30" rx="28" ry="35" fill="none" stroke="#333" stroke-width="2.5"/>
    <path d="M-22,-55 C-15,-70 15,-70 22,-55" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="-10" cy="-30" r="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="10" cy="-30" r="9" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="-1" y1="-30" x2="1" y2="-30" stroke="#333" stroke-width="1.5"/>
    <!-- Body (black suit) -->
    <rect x="-38" y="5" width="76" height="130" rx="5" fill="#222" stroke="#333" stroke-width="2"/>
    <!-- Book in hands -->
    <rect x="38" y="60" width="40" height="55" rx="3" fill="#f5f0e8" stroke="#333" stroke-width="2" transform="rotate(15,58,87)"/>
    <!-- Arms holding book -->
    <path d="M38,40 L55,55 L55,80" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="-12" y1="135" x2="-12" y2="200" stroke="#333" stroke-width="2.5"/>
    <line x1="12" y1="135" x2="12" y2="200" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- Successful people group (center-right) -->
  <g id="s7success" transform="translate(1050,350)" opacity="0">
    <!-- Person 1 (arms up, happy) -->
    <g transform="translate(-120,0)">
      <circle cx="0" cy="-25" r="20" fill="none" stroke="#333" stroke-width="2.5"/>
      <rect x="-20" y="0" width="40" height="70" rx="5" fill="none" stroke="#333" stroke-width="2"/>
      <line x1="-20" y1="15" x2="-40" y2="-30" stroke="#333" stroke-width="2.5"/>
      <line x1="20" y1="15" x2="40" y2="-30" stroke="#333" stroke-width="2.5"/>
      <rect x="-30" y="-60" width="20" height="28" rx="2" fill="none" stroke="#333" stroke-width="1.5" transform="rotate(-15,-20,-46)"/>
    </g>
    <!-- Person 2 -->
    <g transform="translate(0,20)">
      <circle cx="0" cy="-25" r="20" fill="none" stroke="#333" stroke-width="2.5"/>
      <rect x="-22" y="0" width="44" height="75" rx="5" fill="none" stroke="#333" stroke-width="2"/>
      <line x1="-22" y1="15" x2="-45" y2="-25" stroke="#333" stroke-width="2.5"/>
      <line x1="22" y1="15" x2="45" y2="-25" stroke="#333" stroke-width="2.5"/>
      <rect x="25" y="-55" width="20" height="28" rx="2" fill="none" stroke="#333" stroke-width="1.5" transform="rotate(10,35,-41)"/>
    </g>
    <!-- Person 3 -->
    <g transform="translate(120,-10)">
      <circle cx="0" cy="-25" r="20" fill="none" stroke="#333" stroke-width="2.5"/>
      <rect x="-20" y="0" width="40" height="70" rx="5" fill="#333" stroke="#333" stroke-width="2"/>
      <line x1="-20" y1="15" x2="-35" y2="-35" stroke="#333" stroke-width="2.5"/>
      <line x1="20" y1="15" x2="35" y2="-35" stroke="#333" stroke-width="2.5"/>
    </g>
    <!-- Person 4 -->
    <g transform="translate(240,10)">
      <circle cx="0" cy="-25" r="20" fill="none" stroke="#333" stroke-width="2.5"/>
      <rect x="-20" y="0" width="40" height="70" rx="5" fill="none" stroke="#333" stroke-width="2"/>
      <line x1="-20" y1="15" x2="-42" y2="-20" stroke="#333" stroke-width="2.5"/>
      <line x1="20" y1="15" x2="42" y2="-20" stroke="#333" stroke-width="2.5"/>
    </g>
  </g>

  <!-- Center text -->
  <text id="s7quote1" x="750" y="620" font-size="32" fill="#333" font-weight="700" text-anchor="middle" opacity="0">人类天生依赖可见的经验，</text>
  <text id="s7quote2" x="750" y="668" font-size="32" fill="#333" font-weight="700" text-anchor="middle" opacity="0">却忽略"沉默的证据"。</text>

  <!-- Faded failing crowd (appears later, right side) -->
  <g id="s7crowd" opacity="0" transform="translate(1400,380)">
    <g opacity="0.3" transform="translate(0,0)"><circle cx="0" cy="-15" r="12" fill="none" stroke="#888" stroke-width="1.5"/><rect x="-12" y="0" width="24" height="40" rx="3" fill="none" stroke="#888" stroke-width="1.5"/></g>

    <g transform="translate(1550,260)"><path d="M-10,0 L-10,-20 L-5,-25 L5,-25 L10,-20 L10,0" fill="none" stroke="#999" stroke-width="1.5"/><line x1="0" y1="0" x2="0" y2="15" stroke="#999" stroke-width="2"/></g>
  </g>

  <!-- 普通人 labels (appear later, fill the screen) -->
  <g id="s15normal" opacity="0">
    <text x="100" y="400" font-size="32" fill="#999">普通人</text>
    <text x="250" y="550" font-size="28" fill="#bbb">普通人</text>
    <text x="400" y="650" font-size="36" fill="#999">普通人</text>
    <text x="550" y="480" font-size="24" fill="#ccc">普通人</text>
    <text x="700" y="700" font-size="32" fill="#999">普通人</text>
    <text x="1200" y="450" font-size="28" fill="#bbb">普通人</text>
    <text x="1350" y="600" font-size="36" fill="#999">普通人</text>
    <text x="1500" y="500" font-size="24" fill="#ccc">普通人</text>
    <text x="1600" y="700" font-size="32" fill="#999">普通人</text>
    <text x="150" y="750" font-size="28" fill="#bbb">普通人</text>
    <text x="800" y="350" font-size="24" fill="#ccc">普通人</text>
    <text x="1100" y="750" font-size="28" fill="#bbb">普通人</text>
  </g>
</svg>
</div>

<!-- ============ SCENE 16: 结尾 ============ -->
<div class="scene" id="s16">
<svg viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Happy person -->
  <g id="s16person" transform="translate(960,450)" opacity="0">
    <circle cx="0" cy="-30" r="30" fill="none" stroke="#333" stroke-width="3"/>
    <path d="M-12,-22 C-6,-14 6,-14 12,-22" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="-10" cy="-35" r="3" fill="#333"/>
    <circle cx="10" cy="-35" r="3" fill="#333"/>
    <rect x="-30" y="5" width="60" height="100" rx="5" fill="none" stroke="#333" stroke-width="2.5"/>
    <!-- OK hands -->
    <path d="M-30,30 L-70,10 L-80,20" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="-85" cy="15" r="10" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M30,30 L70,10 L80,20" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="85" cy="15" r="10" fill="none" stroke="#333" stroke-width="2"/>
    <line x1="-12" y1="105" x2="-12" y2="175" stroke="#333" stroke-width="2.5"/>
    <line x1="12" y1="105" x2="12" y2="175" stroke="#333" stroke-width="2.5"/>
  </g>

  <!-- Left label -->
  <g id="s16left" opacity="0">
    <rect x="300" y="250" width="80" height="320" rx="10" fill="none" stroke="#333" stroke-width="2.5"/>
    <text x="340" y="350" writing-mode="tb" text-anchor="middle" font-size="36" fill="#333" font-weight="700">多角度观察</text>
    <path d="M380,410 L450,410" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowHead2)"/>
  </g>

  <!-- Right label -->
  <g id="s16right" opacity="0">
    <rect x="1540" y="250" width="80" height="320" rx="10" fill="none" stroke="#333" stroke-width="2.5"/>
    <text x="1580" y="350" writing-mode="tb" text-anchor="middle" font-size="36" fill="#333" font-weight="700">多换位思考</text>
    <path d="M1540,410 L1470,410" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowHead2)"/>
  </g>

  <defs>
    <marker id="arrowHead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

<!-- ============ SCENE 17: 片尾 ============ -->
<div class="scene" id="s17">
  <div style="opacity:0" id="s17text">
    <span class="calli" style="font-size:64px;color:#555;">@爱观察的汤姆</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const M = gsap.timeline({delay:0.3});
const $ = s => document.querySelector(s);
const sub = (t,d=4) => {
  M.to('#subBar',{opacity:1,duration:0.3})
   .set('#subText',{textContent:t})
   .to({},{duration:d})
   .to('#subBar',{opacity:0,duration:0.3});
};
const subOn = t => { M.to('#subBar',{opacity:1,duration:0.3}).set('#subText',{textContent:t}); };
const subOff = () => { M.to('#subBar',{opacity:0,duration:0.3}); };
const subChange = (t,d=4) => { M.set('#subText',{textContent:t}).to({},{duration:d}); };
const fadeIn = (sel,d=0.5) => M.to(sel,{opacity:1,duration:d});
const fadeOut = (sel,d=0.5) => M.to(sel,{opacity:0,duration:d});
const hold = (d=2) => M.to({},{duration:d});

// ===== SCENE 1: Black intro (0-8s) =====
fadeIn('#s1',0.3);
M.to('#s1 .intro-text',{opacity:1,duration:1.2,ease:'power2.out'});
hold(4);
M.to('#s1 .intro-text',{opacity:0,duration:0.8});
fadeOut('#s1',0.5);

// Show corners
M.to('#cornerTitle',{opacity:1,duration:0.5});
M.to('#cornerRight',{opacity:1,duration:0.5},'<');

// ===== SCENE 2: Plane + bullets (8-20s) =====
fadeIn('#s2',0.5);
subOn('军方统计了返航飞机的弹孔分布');
hold(1);

// Bullet holes appear one by one
const bhs = Array.from({length:15},(_,i)=>`#b${i+1}`);
bhs.forEach((bh,i) => {
  M.to(bh,{opacity:1,scale:1.3,duration:0.1,ease:'back.out(4)'},`+=${0.15}`)
   .to(bh,{scale:1,duration:0.1});
  if(i===4) { subChange('以确定哪些部位需要加固',4); }
});
hold(1);

// ===== SCENE 3: Officers suggest (20-30s) =====
subChange('于是建议加强这些部位的防护',3);
// Wing highlight
M.to('#wingHL',{opacity:1,duration:0.8,strokeDashoffset:0});
M.to('#arrowL',{opacity:1,duration:0.5},'<0.3');
M.to('#arrowR',{opacity:1,duration:0.5},'<');
hold(1);

subChange('也认同应该加强机翼的保护',3);
fadeIn('#officer',0.6);
hold(2);

// ===== SCENE 4: Wald disagrees (30-40s) =====
subChange('真正需要防护的是机尾而不是机翼',4);
fadeIn('#wald',0.6);
M.to('#tailHL',{opacity:1,duration:0.8});
hold(2);

subChange('因为那些机尾中弹的飞机早已坠毁',4);
fadeIn('#crashed',0.6);
hold(2);

subChange('而那些沉默的未能返航的数据',3);
M.to('#crashBox',{opacity:1,duration:0.8});
hold(2);
subOff();
fadeOut('#s2',0.6);

// ===== SCENE 5: Conclusion (40-48s) =====
fadeIn('#s5',0.5);
sub('后来事实表明该决策是无比正确的',4);
M.to('#s5labelL',{opacity:1,duration:0.5},'<1');
M.to('#s5labelR',{opacity:1,duration:0.5},'<0.5');
M.to('#s5strike',{opacity:1,duration:0.3},'<1');
hold(1);
fadeOut('#s5',0.6);

// ===== SCENE 6: Concept (48-55s) =====
fadeIn('#s6',0.5);
M.to('#s6box',{opacity:1,duration:0.8});
M.to('#s6planeL',{opacity:1,duration:0.5},'<0.3');
M.to('#s6planeR',{opacity:1,duration:0.5},'<0.3');
M.to('#s6title',{opacity:1,duration:0.8,ease:'power2.out'});
hold(3);
fadeOut('#s6',0.6);

// ===== SCENE 7: Taleb (55-65s) =====
fadeIn('#s7',0.5);
subOn('塔勒布在《黑天鹅》中说过');
fadeIn('#s7reader',0.6);
hold(2);
subChange('就像你刷到100个辞职创业',4);
fadeIn('#s7success',0.6);
M.to('#s7quote1',{opacity:1,duration:0.5},'<0.5');
M.to('#s7quote2',{opacity:1,duration:0.5},'<0.5');
hold(2);
subChange('背后9,999个赔光积蓄的失败者一样',4);
fadeIn('#s7crowd',0.8);
hold(2);
subOff();
fadeOut('#s7',0.6);

// ===== SCENE 8: 别人家的孩子 (65-78s) =====
fadeIn('#s8',0.5);
subOn('经常听到你看别人家的孩子');
fadeIn('#s8box1',0.6);
fadeIn('#s8mom',0.6);
hold(3);
subChange('传到我们家长的耳朵里',3);
fadeIn('#s8box2',0.6);
hold(2);
subOff();
fadeOut('#s8',0.6);

// ===== SCENE 9: 选择性关注 (78-90s) =====
fadeIn('#s9',0.5);
subOn('一选择性关注');
fadeIn('#s9title',0.6);
hold(2);
subChange('而失败经验常被视为负面被过滤',4);
M.to('#s9bg1',{opacity:1,duration:0.8});
M.to('#s9bg2',{opacity:1,duration:0.8},'<0.3');
hold(2);
subChange('因为想给差评的买家早已经被埋葬',4);
fadeIn('#s9para',0.6);
hold(2);
subOff();
fadeOut('#s9',0.6);

// ===== SCENE 10: 归因谬误 (90-100s) =====
fadeIn('#s10',0.5);
subOn('人们习惯将幸存归功于可见因素');
fadeIn('#s10title',0.5);
fadeIn('#s10person',0.5);
hold(2);
subChange('便断言烟酒无害',3);
fadeIn('#s10old',0.6);
fadeIn('#s10text',0.6);
hold(2);
subOff();
fadeOut('#s10',0.6);

// ===== SCENE 11: 信息茧房 (100-115s) =====
fadeIn('#s11',0.5);
subOn('三信息茧房算法推送会强化既有认知');
fadeIn('#s11title',0.5);
hold(2);
subChange('当你频繁刷到辞职创业逆袭的视频',4);
fadeIn('#s11person',0.5);
fadeIn('#s11bubbles',0.6);
hold(3);
subOff();
fadeOut('#s11',0.6);

// ===== SCENE 12: 打破困局 (115-120s) =====
fadeIn('#s12',0.3);
M.to('#s12text',{opacity:1,duration:0.8,ease:'power2.out'});
hold(2);
fadeOut('#s12',0.5);

// ===== SCENE 13: Three frameworks (120-135s) =====
fadeIn('#s13',0.5);
subOn('正如统计学家瓦尔德坚持');
fadeIn('#fw_wald',0.5);
M.to('#fw1',{opacity:1,duration:0.6});
M.to('#fw1t',{opacity:1,duration:0.4},'<0.3');
M.to('#fw2',{opacity:1,duration:0.6},'+=0.3');
M.to('#fw2t',{opacity:1,duration:0.4},'<0.3');
M.to('#fw3',{opacity:1,duration:0.6},'+=0.3');
M.to('#fw3t',{opacity:1,duration:0.4},'<0.3');
hold(1);
subChange('也要主动挖掘未被讲述的故事',4);
fadeIn('#fw_crash',0.5);
fadeIn('#fw_crashT',0.5);
hold(1);
fadeIn('#fw_book',0.6);
hold(2);
subOff();
fadeOut('#s13',0.6);

// ===== SCENE 14: Bayes + Seatbelt (135-170s) =====
fadeIn('#s14',0.5);
subOn('例如设想一次严重车祸');
M.to('#s14title',{opacity:1,duration:0.5});
M.to('#s14fw3',{opacity:1,duration:0.5},'<0.3');
M.to('#s14fw3t',{opacity:1,duration:0.4},'<0.3');
M.to('#s14formula',{opacity:1,duration:0.5});
M.to('#s14f1',{opacity:1,duration:0.4});
M.to('#s14f1t',{opacity:1,duration:0.3},'<0.2');
M.to('#s14f2',{opacity:1,duration:0.4});
M.to('#s14f2t',{opacity:1,duration:0.3},'<0.2');
fadeIn('#s14crash',0.6);
hold(2);

subChange('而几乎所有系安全带的驾驶员幸存',4);
fadeIn('#s14left',0.5);
fadeIn('#s14right',0.5);
hold(2);

subChange('实际上正相反',3);
M.to('#s14survive',{opacity:1,duration:0.4});
M.to('#s14circleR',{opacity:1,duration:0.4});
hold(1);

subChange('才导致幸存者中系带者占比极高',4);
M.to('#s14detail',{opacity:1,duration:0.4});
hold(2);

subChange('我们才能评估安全带的真实保护作用',4);
M.to('#s14circleL',{opacity:1,duration:0.4});
hold(3);
subOff();
fadeOut('#s14',0.6);

// ===== SCENE 15: 成功者 vs 普通人 (170-178s) =====
fadeIn('#s15',0.5);
subOn('我们都是被数据筛选的囚徒');
fadeIn('#s15person',0.5);
fadeIn('#s15success',0.6);
hold(2);
subChange('在于看见别人看不到的盲区',4);
fadeIn('#s15normal',0.8);
hold(3);
subOff();
fadeOut('#s15',0.6);

// ===== SCENE 16: Happy ending (178-185s) =====
fadeIn('#s16',0.5);
fadeIn('#s16person',0.6);
M.to('#s16left',{opacity:1,duration:0.5},'+=0.3');
M.to('#s16right',{opacity:1,duration:0.5},'<0.2');
hold(3);
fadeOut('#s16',0.5);

// ===== SCENE 17: Credits (185-191s) =====
// Hide corners
M.to('#cornerTitle',{opacity:0,duration:0.5});
M.to('#cornerRight',{opacity:0,duration:0.5},'<');
fadeIn('#s17',0.5);
M.to('#s17text',{opacity:1,duration:1});
hold(3);
fadeOut('#s17',1);

// Progress bar
M.eventCallback('onUpdate',()=>{
  $('#prog').style.width=(M.progress()*100)+'%';
});
M.eventCallback('onComplete',()=>{
  console.log('Done. Duration:',M.duration()+'s');
});
</script>
</body>
</html>
