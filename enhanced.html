<script>
// ==================== PARTICLE SYSTEM ====================
class ParticleSystem {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.particles = [];
    this.running = false;
  }

  burst(x, y, count=20, color='#c0392b', spread=80) {
    for(let i=0; i<count; i++){
      const angle = (Math.PI*2/count)*i + Math.random()*0.5;
      const speed = 2 + Math.random()*4;
      const size = 2 + Math.random()*4;
      this.particles.push({
        x, y,
        vx: Math.cos(angle)*speed*spread/80,
        vy: Math.sin(angle)*speed*spread/80,
        size,
        color,
        alpha: 1,
        decay: 0.015 + Math.random()*0.02,
        life: 1
      });
    }
    if(!this.running) this.animate();
  }

  floatingDots(count=30) {
    for(let i=0; i<count; i++){
      this.particles.push({
        x: Math.random()*1920,
        y: Math.random()*1080,
        vx: (Math.random()-0.5)*0.3,
        vy: (Math.random()-0.5)*0.3,
        size: 1+Math.random()*2,
        color: `rgba(192,57,43,${0.1+Math.random()*0.15})`,
        alpha: 0.1+Math.random()*0.2,
        decay: 0,
        life: 999
      });
    }
    if(!this.running) this.animate();
  }

  clear() {
    this.particles = [];
    this.ctx.clearRect(0,0,1920,1080);
  }

  animate() {
    this.running = true;
    const loop = () => {
      this.ctx.clearRect(0,0,1920,1080);
      this.particles = this.particles.filter(p => p.alpha > 0.01 && p.life > 0);
      for(const p of this.particles){
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.02; // gravity
        p.alpha -= p.decay;
        p.life -= p.decay;
        this.ctx.save();
        this.ctx.globalAlpha = Math.max(0, p.alpha);
        this.ctx.fillStyle = p.color;
        this.ctx.beginPath();
        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        this.ctx.fill();
        this.ctx.restore();
      }
      if(this.particles.length > 0) requestAnimationFrame(loop);
      else this.running = false;
    };
    loop();
  }
}

// ==================== ROUGH.JS DRAWING HELPERS ====================
function drawRoughPlane(canvas, bulletHoles, highlights) {
  const rc = rough.canvas(canvas);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,1920,1080);

  const cx=960, cy=400;

  // Fuselage
  rc.ellipse(cx, cy, 120, 440, {stroke:'#333', strokeWidth:2.5, roughness:1.2, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});

  // Wings
  rc.polygon([[cx-50,cy-30],[cx-350,cy-60],[cx-350,cy-30],[cx-50,cy+10]], {stroke:'#333', strokeWidth:2.5, roughness:1.5, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});
  rc.polygon([[cx+50,cy-30],[cx+350,cy-60],[cx+350,cy-30],[cx+50,cy+10]], {stroke:'#333', strokeWidth:2.5, roughness:1.5, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});

  // Tail wings
  rc.polygon([[cx-30,cy+190],[cx-150,cy+170],[cx-150,cy+190],[cx-30,cy+210]], {stroke:'#333', strokeWidth:2, roughness:1.5, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});
  rc.polygon([[cx+30,cy+190],[cx+150,cy+170],[cx+150,cy+190],[cx+30,cy+210]], {stroke:'#333', strokeWidth:2, roughness:1.5, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});

  // Tail fin
  rc.polygon([[cx-8,cy+210],[cx,cy+245],[cx+8,cy+210]], {stroke:'#333', strokeWidth:2, roughness:1.2});

  // Engines
  rc.ellipse(cx-160, cy-20, 44, 80, {stroke:'#333', strokeWidth:2, roughness:1, fill:'rgba(232,224,208,0.9)', fillStyle:'solid'});
  rc.ellipse(cx+160, cy-20, 44, 80, {stroke:'#333', strokeWidth:2, roughness:1, fill:'rgba(232,224,208,0.9)', fillStyle:'solid'});

  // Cockpit
  rc.ellipse(cx, cy-190, 50, 90, {stroke:'#333', strokeWidth:2, roughness:0.8, fill:'rgba(200,220,240,0.4)', fillStyle:'solid'});

  // Stars on wings
  rc.circle(cx-250, cy-40, 36, {stroke:'#999', strokeWidth:1.2, roughness:0.8});
  rc.circle(cx+250, cy-40, 36, {stroke:'#999', strokeWidth:1.2, roughness:0.8});

  // Bullet holes
  if(bulletHoles){
    const holes = [
      [cx-200,cy-50,7],[cx-280,cy-45,6],[cx-120,cy-40,5],[cx+180,cy-48,7],[cx+260,cy-42,6],
      [cx+130,cy-35,5],[cx-30,cy-80,6],[cx+25,cy-40,7],[cx-20,cy+30,5],[cx+40,cy+80,6],
      [cx-310,cy-50,5],[cx+310,cy-48,5],[cx-35,cy+130,5],[cx+20,cy+150,6],[cx+35,cy-100,5]
    ];
    for(let i=0; i<bulletHoles; i++){
      if(i >= holes.length) break;
      const [hx,hy,hr] = holes[i];
      rc.circle(hx, hy, hr*2, {stroke:'#222', strokeWidth:1.5, roughness:0.5, fill:'#333', fillStyle:'solid'});
      // Inner dark
      ctx.save();
      ctx.fillStyle='#111';
      ctx.beginPath();
      ctx.arc(hx,hy,hr*0.5,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  // Highlights
  if(highlights === 'wings'){
    rc.ellipse(cx, cy-20, 760, 200, {stroke:'#333', strokeWidth:2, roughness:1.5, strokeLineDash:[15,8]});
  }
  if(highlights === 'tail'){
    rc.ellipse(cx, cy+195, 340, 130, {stroke:'#c0392b', strokeWidth:3, roughness:1.5, strokeLineDash:[12,6]});
  }
  if(highlights === 'both'){
    rc.ellipse(cx, cy-20, 760, 200, {stroke:'#333', strokeWidth:2, roughness:1.5, strokeLineDash:[15,8]});
    rc.ellipse(cx, cy+195, 340, 130, {stroke:'#c0392b', strokeWidth:3, roughness:1.5, strokeLineDash:[12,6]});
    // Engine highlights (green dashed)
    rc.ellipse(cx-160, cy-20, 70, 100, {stroke:'#27ae60', strokeWidth:2.5, roughness:1, strokeLineDash:[8,4]});
    rc.ellipse(cx+160, cy-20, 70, 100, {stroke:'#27ae60', strokeWidth:2.5, roughness:1, strokeLineDash:[8,4]});
    rc.ellipse(cx, cy-190, 70, 100, {stroke:'#27ae60', strokeWidth:2.5, roughness:1, strokeLineDash:[8,4]});
  }
}

function drawRoughConcept(canvas) {
  const rc = rough.canvas(canvas);
  // Big red dashed box
  rc.rectangle(310, 180, 1300, 500, {stroke:'#c0392b', strokeWidth:4, roughness:2, strokeLineDash:[18,8]});
  // Small plane left
  rc.ellipse(600, 380, 40, 140, {stroke:'#333', strokeWidth:2, roughness:1.5});
  rc.line(580, 370, 480, 320, {stroke:'#333', strokeWidth:2, roughness:1.5});
  rc.line(620, 370, 720, 320, {stroke:'#333', strokeWidth:2, roughness:1.5});
  // Small plane right with holes
  rc.ellipse(1300, 360, 70, 260, {stroke:'#333', strokeWidth:2, roughness:1.2, fill:'rgba(232,224,208,0.5)', fillStyle:'solid'});
  rc.line(1260, 340, 1100, 310, {stroke:'#333', strokeWidth:2, roughness:1.5});
  rc.line(1340, 340, 1500, 310, {stroke:'#333', strokeWidth:2, roughness:1.5});
  // Holes on right plane
  rc.circle(1270, 330, 8, {stroke:'#333', fill:'#333', fillStyle:'solid', roughness:0.5});
  rc.circle(1330, 350, 8, {stroke:'#333', fill:'#333', fillStyle:'solid', roughness:0.5});
  rc.circle(1290, 400, 8, {stroke:'#333', fill:'#333', fillStyle:'solid', roughness:0.5});
}

function drawRoughTaleb(canvas) {
  const rc = rough.canvas(canvas);
  // Reader figure (left)
  rc.circle(250, 320, 56, {stroke:'#333', strokeWidth:2.5, roughness:1.2});
  // Glasses
  rc.circle(240, 320, 16, {stroke:'#333', strokeWidth:1.5, roughness:0.8});
  rc.circle(260, 320, 16, {stroke:'#333', strokeWidth:1.5, roughness:0.8});
  rc.line(248, 320, 252, 320, {stroke:'#333', strokeWidth:1.5});
  // Body
  rc.rectangle(212, 350, 76, 130, {stroke:'#333', strokeWidth:2.5, roughness:1.2, fill:'#222', fillStyle:'solid'});
  // Book
  rc.rectangle(290, 400, 40, 55, {stroke:'#333', strokeWidth:2, roughness:1, fill:'#f5f0e8', fillStyle:'solid'});

  // Success group (right)
  const sx = 1200;
  for(let i=0; i<4; i++){
    const px = sx + i*100;
    const py = 310 + (i%2)*20;
    rc.circle(px, py, 40, {stroke:'#333', strokeWidth:2, roughness:1.2});
    rc.rectangle(px-20, py+25, 40, 60, {stroke:'#333', strokeWidth:2, roughness:1.2});
    // Arms up
    rc.line(px-20, py+35, px-40, py-10, {stroke:'#333', strokeWidth:2, roughness:1.5});
    rc.line(px+20, py+35, px+40, py-10, {stroke:'#333', strokeWidth:2, roughness:1.5});
  }

  // Faded crowd (far right)
  for(let i=0; i<6; i++){
    const px = 1550 + (i%3)*50;
    const py = 340 + Math.floor(i/3)*60;
    rc.circle(px, py, 24, {stroke:'rgba(150,150,150,0.4)', strokeWidth:1.5, roughness:1});
    rc.rectangle(px-12, py+15, 24, 35, {stroke:'rgba(150,150,150,0.4)', strokeWidth:1.5, roughness:1});
  }
}

function drawRoughAttribution(canvas) {
  const rc = rough.canvas(canvas);
  // Title rounded box
  rc.rectangle(700, 50, 520, 90, {stroke:'#333', strokeWidth:3, roughness:1.5});

  // Young person (left)
  rc.circle(400, 470, 50, {stroke:'#333', strokeWidth:2.5, roughness:1.2});
  rc.rectangle(375, 500, 50, 90, {stroke:'#333', strokeWidth:2.5, roughness:1.2});

  // Old man with chair (right)
  rc.rectangle(1330, 500, 100, 80, {stroke:'#333', strokeWidth:2, roughness:1.2});
  rc.circle(1380, 440, 50, {stroke:'#333', strokeWidth:2.5, roughness:1.2});
  // Cigarette
  rc.line(1395, 440, 1430, 435, {stroke:'#333', strokeWidth:2, roughness:0.5});
  // Smoke
  rc.path('M1430 435 C1435 420 1440 415 1435 400', {stroke:'rgba(150,150,150,0.5)', strokeWidth:1.5, roughness:1.5});
}

function drawRoughFramework(canvas) {
  const rc = rough.canvas(canvas);
  // Connecting lines between cards
  rc.line(500, 280, 750, 280, {stroke:'#c0392b', strokeWidth:2, roughness:1.5});
  rc.line(1150, 280, 1400, 280, {stroke:'#c0392b', strokeWidth:2, roughness:1.5});

  // Wald figure at bottom
  rc.circle(960, 680, 50, {stroke:'#333', strokeWidth:2.5, roughness:1.2});
  rc.circle(948, 678, 14, {stroke:'#333', strokeWidth:1.5, roughness:0.8});
  rc.circle(972, 678, 14, {stroke:'#333', strokeWidth:1.5, roughness:0.8});
  rc.line(955, 678, 965, 678, {stroke:'#333', strokeWidth:1.5});
  rc.rectangle(932, 710, 56, 100, {stroke:'#333', strokeWidth:2.5, roughness:1.2});
  rc.rectangle(940, 720, 40, 70, {stroke:'#333', strokeWidth:1.5, roughness:1});

  // Crashed plane (bottom left)
  rc.ellipse(400, 820, 40, 120, {stroke:'#333', strokeWidth:2, roughness:1.5});
  rc.line(380, 810, 300, 780, {stroke:'#333', strokeWidth:2, roughness:1.5});
  rc.line(420, 810, 500, 780, {stroke:'#333', strokeWidth:2, roughness:1.5});
  rc.path('M395 760 C385 730 392 720 388 700', {stroke:'rgba(150,150,150,0.5)', strokeWidth:2, roughness:1.5});
}

function drawRoughEnding(canvas) {
  const rc = rough.canvas(canvas);
  // Scattered "成功者" and "普通人" boxes
  const successPos = [[200,200],[1500,180],[600,150],[1300,250]];
  successPos.forEach(([x,y]) => {
    rc.rectangle(x-60,y-20,120,40, {stroke:'#c0392b', strokeWidth:2, roughness:1.5, fill:'rgba(192,57,43,0.05)', fillStyle:'solid'});
  });
  // Trophy icons
  rc.path('M240 160 L240 140 L245 130 L255 130 L260 140 L260 160', {stroke:'#c0392b', strokeWidth:1.5, roughness:1});
}

// ==================== MAIN ANIMATION ====================
document.getElementById('playBtn').addEventListener('click', function(){
  this.style.display='none';
  startAnimation();
});

function startAnimation(){
  const audio = document.getElementById('narration');
  audio.play();

  const PS = new ParticleSystem(document.getElementById('particleCanvas'));
  const M = gsap.timeline();
  const $ = s => document.querySelector(s);

  const subOn = t => { M.to('#subBar',{opacity:1,duration:0.3}).set('#subText',{textContent:t}); };
  const subOff = () => { M.to('#subBar',{opacity:0,duration:0.3}); };
  const subChange = t => { M.set('#subText',{textContent:t}); };
  const fadeIn = (sel,d=0.5) => M.to(sel,{opacity:1,duration:d});
  const fadeOut = (sel,d=0.5) => M.to(sel,{opacity:0,duration:d});
  const hold = (d=2) => M.to({},{duration:d});

  // Track bullet hole count for progressive drawing
  let bulletCount = 0;
  let planeState = 'none'; // none, wings, tail, both

  // ===== SCENE 1: Black intro =====
  fadeIn('#s1',0.3);
  M.to('#s1 .intro-text',{opacity:1,duration:1.2,ease:'power2.out'});
  hold(4);
  M.to('#s1 .intro-text',{opacity:0,duration:0.8});
  fadeOut('#s1',0.5);

  // Corners
  M.to('#cornerTitle',{opacity:1,duration:0.5});
  M.to('#cornerRight',{opacity:1,duration:0.5},'<');

  // Floating particles
  M.call(()=>PS.floatingDots(25));

  // ===== SCENE 2: Plane with rough.js =====
  // Draw plane without holes first
  M.call(()=>drawRoughPlane($('#roughPlane'), 0, 'none'));
  fadeIn('#s2',0.5);
  subOn('军方统计了返航飞机的弹孔分布');

  // Bullet holes appear progressively with particle bursts
  const holePositions = [
    [760,350],[680,355],[840,360],[1140,352],[1220,358],
    [1090,365],[930,320],[985,360],[940,430],[1000,480],
    [650,350],[1270,352],[925,530],[980,550],[995,300]
  ];

  for(let i=1; i<=15; i++){
    const idx = i;
    M.call(()=>{
      drawRoughPlane($('#roughPlane'), idx, planeState);
      const [px,py] = holePositions[idx-1];
      PS.burst(px, py, 8, '#555', 30);
    });
    M.to({},{duration:0.15});
    if(i===8) subChange('以确定哪些部位需要加固');
  }
  hold(0.5);

  // Wing highlight
  subChange('于是建议加强这些部位的防护');
  M.call(()=>{ planeState='wings'; drawRoughPlane($('#roughPlane'), 15, 'wings'); });
  hold(2);

  // Officer
  subChange('也认同应该加强机翼的保护');
  fadeIn('#s2officer',0.6);
  hold(2);

  // Wald + tail highlight
  subChange('真正需要防护的是机尾而不是机翼');
  fadeIn('#s2wald',0.6);
  M.call(()=>{ planeState='both'; drawRoughPlane($('#roughPlane'), 15, 'both'); });
  hold(3);

  subChange('因为那些机尾中弹的飞机早已坠毁');
  // Particle burst at tail area
  M.call(()=>PS.burst(960, 595, 30, '#c0392b', 60));
  hold(3);

  subChange('而那些沉默的未能返航的数据');
  hold(2.5);
  subOff();
  fadeOut('#s2',0.6);

  // ===== SCENE 5: Conclusion =====
  M.call(()=>{
    const rc = rough.canvas($('#roughConclusion'));
    // Left: clean plane
    rc.ellipse(480, 350, 50, 180, {stroke:'#333', strokeWidth:2.5, roughness:1.5, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});
    rc.line(455,335,360,305,{stroke:'#333',strokeWidth:2,roughness:1.5});
    rc.line(505,335,600,305,{stroke:'#333',strokeWidth:2,roughness:1.5});
    // Right: damaged plane
    rc.ellipse(1440, 320, 100, 360, {stroke:'#333', strokeWidth:2.5, roughness:1.2, fill:'rgba(232,224,208,0.8)', fillStyle:'solid'});
    rc.line(1390,295,1160,260,{stroke:'#333',strokeWidth:2.5,roughness:1.5});
    rc.line(1490,295,1720,260,{stroke:'#333',strokeWidth:2.5,roughness:1.5});
    // Bullet holes on right
    [[-40,-50],[40,-30],[-20,30],[30,60],[-30,80],[20,100]].forEach(([dx,dy])=>{
      rc.circle(1440+dx,320+dy,10,{stroke:'#333',fill:'#333',fillStyle:'solid',roughness:0.5});
    });
  });
  fadeIn('#s5',0.5);
  subOn('后来事实表明该决策是无比正确的');
  fadeIn('#s5labelL',0.5);
  M.to('#s5labelR',{opacity:1,duration:0.5},'+=0.3');
  hold(2);
  subOff();
  fadeOut('#s5',0.6);

  // ===== SCENE 6: Concept =====
  M.call(()=>drawRoughConcept($('#roughConcept')));
  fadeIn('#s6',0.5);
  M.to('#s6title',{opacity:1,duration:0.8,scale:1,ease:'back.out(1.5)'});
  M.call(()=>PS.burst(960,540,40,'#c0392b',120));
  hold(2.5);
  fadeOut('#s6',0.6);

  // ===== SCENE 7: Taleb =====
  M.call(()=>drawRoughTaleb($('#roughTaleb')));
  fadeIn('#s7',0.5);
  subOn('塔勒布在《黑天鹅》中说过');
  M.to('#s7quote',{opacity:1,duration:0.6},'+=1');
  hold(3);
  subChange('就像你刷到100个辞职创业');
  hold(4);
  subChange('背后9,999个赔光积蓄的失败者一样');
  hold(4);
  subOff();
  fadeOut('#s7',0.6);

  // ===== SCENE 10: 归因谬误 =====
  M.call(()=>drawRoughAttribution($('#roughAttribution')));
  fadeIn('#s10',0.5);
  subOn('人们习惯将幸存归功于可见因素');
  fadeIn('#s10title',0.5);
  hold(4);
  subChange('便断言烟酒无害');
  fadeIn('#s10text',0.6);
  hold(5);
  subOff();
  fadeOut('#s10',0.6);

  // ===== SCENE 12: 打破困局 =====
  fadeIn('#s12',0.3);
  M.to('#s12text',{opacity:1,duration:0.8,ease:'power2.out'});
  M.call(()=>PS.burst(960,540,50,'#c0392b',150));
  hold(2);
  fadeOut('#s12',0.5);

  // ===== SCENE 13: Frameworks =====
  M.call(()=>drawRoughFramework($('#roughFramework')));
  fadeIn('#s13',0.5);
  subOn('寻找沉默证据 概率替代直觉 系统认知框架');
  M.to('#fw1box',{opacity:1,y:0,duration:0.5,ease:'back.out(1.5)'},'+=0.3');
  M.to('#fwArrow1',{opacity:1,duration:0.3},'+=0.2');
  M.to('#fw2box',{opacity:1,y:0,duration:0.5,ease:'back.out(1.5)'},'+=0.2');
  M.to('#fwArrow2',{opacity:1,duration:0.3},'+=0.2');
  M.to('#fw3box',{opacity:1,y:0,duration:0.5,ease:'back.out(1.5)'},'+=0.2');
  hold(5);
  subOff();
  fadeOut('#s13',0.6);

  // ===== SCENE 15: Ending =====
  M.call(()=>drawRoughEnding($('#roughEnding')));
  fadeIn('#s15',0.5);
  subOn('真正的智慧在于看见别人看不到的盲区');
  fadeIn('#s15center',0.8);
  M.call(()=>PS.burst(960,540,60,'#c0392b',200));
  hold(5);
  subOff();
  fadeOut('#s15',0.6);

  // ===== SCENE 17: Credits =====
  M.to('#cornerTitle',{opacity:0,duration:0.5});
  M.to('#cornerRight',{opacity:0,duration:0.5},'<');
  fadeIn('#s17',0.5);
  M.to('#s17text',{opacity:1,duration:1});
  hold(3);
  fadeOut('#s17',1);

  // Progress
  M.eventCallback('onUpdate',()=>{
    $('#prog').style.width=(M.progress()*100)+'%';
  });
  M.eventCallback('onComplete',()=>{
    audio.pause();
    PS.clear();
  });

  // Sync audio
  setInterval(()=>{
    if(!audio.paused && Math.abs(M.time()-audio.currentTime)>0.5){
      M.time(audio.currentTime);
    }
  },500);
}
</script>
